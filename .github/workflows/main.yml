name: Build Android Sidecar

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.22

    - name: Build Go Sidecar
      run: |
        cd go-sidecar   # ⭐⭐⭐ 强制进入目录（关键修复）

        go mod tidy

        export CGO_ENABLED=1
        export GOOS=android
        export GOARCH=arm64

        go build -buildmode=c-shared -o libproxy.so .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: libproxy
        path: go-sidecar/libproxy.so
