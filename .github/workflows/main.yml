name: build-android-sidecar

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # =========================
      # 1. Setup Go
      # =========================
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      # =========================
      # 2. Setup Android NDK
      # =========================
      - name: Setup Android NDK
        uses: nttld/setup-android-ndk@v1
        with:
          ndk-version: r26d

      # =========================
      # 3. Go mod
      # =========================
      - name: Go mod tidy
        run: |
          cd go-sidecar
          go mod tidy

      # =========================
      # 4. Build CGO Android .so
      # =========================
      - name: Build Android shared library
        run: |
          cd go-sidecar

          export ANDROID_NDK_HOME=$ANDROID_NDK_ROOT
          export TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64

          export API=21
          export TARGET=aarch64-linux-android

          export CC=$TOOLCHAIN/bin/${TARGET}${API}-clang

          export CGO_ENABLED=1
          export GOOS=android
          export GOARCH=arm64

          go build -buildmode=c-shared -o libproxy.so .

      # =========================
      # 5. Upload artifact
      # =========================
      - name: Upload .so
        uses: actions/upload-artifact@v4
        with:
          name: libproxy
          path: go-sidecar/libproxy.so
